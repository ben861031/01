<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyCzvPwTbxc_Lg7peKRgP0zUrlmI6kkE0b4",
    authDomain: "seal-management-68465.firebaseapp.com",
    projectId: "seal-management-68465",
    storageBucket: "seal-management-68465.firebasestorage.app",
    messagingSenderId: "933578260928",
    appId: "1:933578260928:web:4c5f41252fd786e1bf0825",
    measurementId: "G-7RKPNF7BK9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const sealList = ["(1)", "(3)", "(4)", "(5)", "(6)"];

let records = [];

const rowsPerPage = 10;
let currentPage = 1;

function formatDate(date){

    if(!date) return "-";

    if(date.seconds){

        return new Date(date.seconds * 1000)
            .toLocaleString("zh-TW",{

                year:'numeric',
                month:'2-digit',
                day:'2-digit',
                hour:'2-digit',
                minute:'2-digit'

            });

    }

    return new Date(date).toLocaleString("zh-TW");

}

async function borrowSeal(){

    const borrower =
        document.getElementById("borrower").value.trim();

    const department =
        document.getElementById("department").value.trim();

    const seal =
        document.getElementById("seal").value;

    const purpose =
        document.getElementById("purpose").value.trim();

    if(!borrower || !seal || !purpose){

        alert("請填寫必要欄位");
        return;
    }

    const alreadyBorrowed =
        records.find(r=>r.seal===seal && !r.returnTime);

    if(alreadyBorrowed){

        alert(`印鑑 ${seal} 目前借出中`);
        return;
    }

    await addDoc(collection(db,"sealRecords"),{

        seal:seal,
        borrower:borrower,
        department:department,
        purpose:purpose,
        borrowTime:new Date(),
        returnTime:null

    });

    alert("借用成功");

    document.getElementById("borrower").value = "";
    document.getElementById("department").value = "";
    document.getElementById("seal").value = "";
    document.getElementById("purpose").value = "";

    loadRecords();

}

async function returnSeal(id){

    const ref = doc(db,"sealRecords",id);

    await updateDoc(ref,{

        returnTime:new Date()

    });

    alert("已完成歸還");

    loadRecords();

}

async function loadRecords(){

    const querySnapshot =
        await getDocs(collection(db,"sealRecords"));

    records = [];

    querySnapshot.forEach((docSnap)=>{

        records.push({

            id:docSnap.id,
            ...docSnap.data()

        });

    });

    renderStatus();
    renderTable();
    renderUnreturned();

}

function renderStatus(){

    const grid =
        document.getElementById("statusGrid");

    grid.innerHTML = "";

    sealList.forEach(seal=>{

        const active =
            records.find(r=>r.seal===seal && !r.returnTime);

        const card =
            document.createElement("div");

        card.className =
            active ? "card borrowed" : "card available";

        card.innerHTML = `

            <h3>${seal}</h3>

            <p>
                ${active ? "🔴 借出中" : "🟢 可借用"}
            </p>

            <small>
                ${
                    active
                    ? `借用人：${active.borrower}`
                    : "目前可使用"
                }
            </small>

        `;

        grid.appendChild(card);

    });

}

function renderUnreturned(){

    const area =
        document.getElementById("unreturnedArea");

    area.innerHTML = "";

    const activeList =
        records.filter(r=>!r.returnTime);

    if(activeList.length===0){

        area.innerHTML = "目前無未歸還紀錄";
        return;
    }

    activeList.forEach(r=>{

        const borrowTime =
            new Date(r.borrowTime.seconds * 1000);

        const now = new Date();

        const hours =
            Math.floor((now - borrowTime)/(1000*60*60));

        const div =
            document.createElement("div");

        div.className = "alert-box";

        div.innerHTML = `

            ⚠ 印鑑 ${r.seal} 尚未歸還<br>

            借用人：${r.borrower}<br>

            已借用 ${hours} 小時

        `;

        area.appendChild(div);

    });

}

function getFilteredRecords(){

    const keyword =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    const startDate =
        document.getElementById("startDate").value;

    const endDate =
        document.getElementById("endDate").value;

    return records.filter(r=>{

        const matchKeyword =

            r.borrower.toLowerCase().includes(keyword) ||

            r.department.toLowerCase().includes(keyword) ||

            r.purpose.toLowerCase().includes(keyword);

        const borrowDate =
            new Date(r.borrowTime.seconds * 1000);

        let matchDate = true;

        if(startDate){

            matchDate =
                borrowDate >= new Date(startDate);

        }

        if(endDate){

            const end = new Date(endDate);

            end.setHours(23,59,59);

            matchDate =
                matchDate && borrowDate <= end;

        }

        return matchKeyword && matchDate;

    });

}

function renderTable(){

    const table =
        document.getElementById("recordTable");

    table.innerHTML = "";

    const filtered =
        getFilteredRecords().reverse();

    const totalPages =
        Math.ceil(filtered.length / rowsPerPage);

    if(currentPage > totalPages){

        currentPage = totalPages || 1;

    }

    const start =
        (currentPage - 1) * rowsPerPage;

    const pageData =
        filtered.slice(start, start + rowsPerPage);

    pageData.forEach(r=>{

        const tr =
            document.createElement("tr");

        tr.innerHTML = `

            <td>${r.seal}</td>

            <td>${r.borrower}</td>

            <td>${r.department}</td>

            <td>${formatDate(r.borrowTime)}</td>

            <td>${formatDate(r.returnTime)}</td>

            <td>${r.purpose}</td>

            <td>

                ${
                    r.returnTime

                    ? '<span class="badge badge-green">已歸還</span>'

                    : '<span class="badge badge-red">借出中</span>'
                }

            </td>

            <td>

                ${
                    !r.returnTime

                    ? `
                        <button
                            class="return-btn"
                            onclick="returnSeal('${r.id}')"
                        >
                            歸還
                        </button>
                    `

                    : '-'
                }

            </td>

        `;

        table.appendChild(tr);

    });

    document.getElementById("pageInfo").innerText =

        `第 ${currentPage} / ${totalPages || 1} 頁`;

}

window.borrowSeal = borrowSeal;
window.returnSeal = returnSeal;

document.getElementById("searchInput")
.addEventListener("input",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("startDate")
.addEventListener("change",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("endDate")
.addEventListener("change",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

    if(currentPage>1){

        currentPage--;

        renderTable();

    }

});

document.getElementById("nextBtn")
.addEventListener("click",()=>{

    const totalPages =
        Math.ceil(getFilteredRecords().length / rowsPerPage);

    if(currentPage < totalPages){

        currentPage++;

        renderTable();

    }

});

loadRecords();

</script>
