<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyCzvPwTbxc_Lg7peKRgP0zUrlmI6kkE0b4",
authDomain: "seal-management-68465.firebaseapp.com",
projectId: "seal-management-68465",
storageBucket: "seal-management-68465.firebasestorage.app",
messagingSenderId: "933578260928",
appId: "1:933578260928:web:4c5f41252fd786e1bf0825",
measurementId: "G-7RKPNF7BK9"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "系統使用者";
let isAdmin = true;

let records = [];
let sealList = [];
let departmentList = [];

let currentPage = 1;
let pageSize = 10;

function showPage(pageId,el){

document
.querySelectorAll("#borrowPage,#returnPage,#historyPage,#sealPage,#deptPage")
.forEach(page=>page.classList.add("hidden"));

document
.getElementById(pageId)
.classList.remove("hidden");

document
.querySelectorAll(".menu-item")
.forEach(item=>item.classList.remove("active"));

el.classList.add("active");

}

window.showPage = showPage;

function formatDate(date){

if(!date) return "-";

if(date.seconds){

return new Date(date.seconds * 1000)
.toLocaleString("zh-TW");

}

return new Date(date)
.toLocaleString("zh-TW");

}

function sameDate(firebaseDate,selectedDate){

if(!firebaseDate || !selectedDate)
return false;

const d1 = firebaseDate.seconds
? new Date(firebaseDate.seconds * 1000)
: new Date(firebaseDate);

const d2 = new Date(selectedDate);

return (

d1.getFullYear() === d2.getFullYear() &&
d1.getMonth() === d2.getMonth() &&
d1.getDate() === d2.getDate()

);

}

/* 部門 */

async function loadDepartments(){

const querySnapshot =
await getDocs(collection(db,"departments"));

departmentList = [];

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

departmentList.push({

id:docSnap.id,
name:data.name,
sortOrder:Number(data.sortOrder || 999)

});

});

departmentList.sort((a,b)=>
a.sortOrder - b.sortOrder
);

renderDepartmentDropdown();
renderDepartmentMaintenance();

}

function renderDepartmentDropdown(){

const select =
document.getElementById("department");

select.innerHTML =
`<option value="">請選擇</option>`;

departmentList.forEach(dept=>{

select.innerHTML += `
<option value="${dept.name}">
${dept.name}
</option>
`;

});

}

function renderDepartmentMaintenance(){

const area =
document.getElementById("deptListArea");

area.innerHTML = "";

departmentList.forEach(dept=>{

const div =
document.createElement("div");

div.className =
"maintenance-item";

div.innerHTML = `

<div>
<strong>${dept.name}</strong>
<br>
排序：${dept.sortOrder}
</div>

<div class="maintenance-actions">

<button class="btn btn-gray"
onclick="moveDeptUp('${dept.id}')">
⬆
</button>

<button class="btn btn-gray"
onclick="moveDeptDown('${dept.id}')">
⬇
</button>

<button class="btn btn-red"
onclick="deleteDepartment('${dept.id}')">
刪除
</button>

</div>
`;

area.appendChild(div);

});

}

async function moveDeptUp(id){

const index =
departmentList.findIndex(d=>d.id===id);

if(index <= 0) return;

[departmentList[index - 1],
departmentList[index]] =

[departmentList[index],
departmentList[index - 1]];

for(let i=0;i<departmentList.length;i++){

await updateDoc(
doc(db,"departments",departmentList[i].id),
{
sortOrder:i + 1
}
);

}

await loadDepartments();

}

async function moveDeptDown(id){

const index =
departmentList.findIndex(d=>d.id===id);

if(index >= departmentList.length - 1)
return;

[departmentList[index],
departmentList[index + 1]] =

[departmentList[index + 1],
departmentList[index]];

for(let i=0;i<departmentList.length;i++){

await updateDoc(
doc(db,"departments",departmentList[i].id),
{
sortOrder:i + 1
}
);

}

await loadDepartments();

}

async function addDepartment(){

const name =
document.getElementById("newDept")
.value.trim();

const order =
parseInt(
document.getElementById("newDeptOrder").value
);

if(!name || isNaN(order)){

alert("請完整填寫");
return;

}

await addDoc(collection(db,"departments"),{

name:name,
sortOrder:order

});

document.getElementById("newDept").value = "";
document.getElementById("newDeptOrder").value = "";

alert("新增成功");

await loadDepartments();

}

async function deleteDepartment(id){

await deleteDoc(doc(db,"departments",id));

alert("已刪除");

await loadDepartments();

}

/* 印鑑 */

async function loadSeals(){

const querySnapshot =
await getDocs(collection(db,"seals"));

sealList = [];

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

sealList.push({

id:docSnap.id,
name:data.name,
sortOrder:Number(data.sortOrder || 999)

});

});

sealList.sort((a,b)=>
a.sortOrder - b.sortOrder
);

renderSealDropdown();
renderSealFilter();
renderSealMaintenance();
renderStatus();
renderSealAlert();

}

function renderSealDropdown(){

const select =
document.getElementById("seal");

select.innerHTML =
`<option value="">請選擇</option>`;

sealList.forEach(seal=>{

select.innerHTML += `
<option value="${seal.name}">
${seal.name}
</option>
`;

});

}

function renderSealFilter(){

const select =
document.getElementById("sealFilter");

select.innerHTML =
`<option value="">全部印鑑</option>`;

sealList.forEach(seal=>{

select.innerHTML += `
<option value="${seal.name}">
${seal.name}
</option>
`;

});

}

function renderSealMaintenance(){

const area =
document.getElementById("sealListArea");

area.innerHTML = "";

sealList.forEach(seal=>{

const div =
document.createElement("div");

div.className =
"maintenance-item";

div.innerHTML = `

<div>
<strong>${seal.name}</strong>
<br>
排序：${seal.sortOrder}
</div>

<div class="maintenance-actions">

<button class="btn btn-gray"
onclick="moveUp('${seal.id}')">
⬆
</button>

<button class="btn btn-gray"
onclick="moveDown('${seal.id}')">
⬇
</button>

<button class="btn btn-red"
onclick="deleteSeal('${seal.id}')">
刪除
</button>

</div>
`;

area.appendChild(div);

});

}

async function moveUp(id){

const index =
sealList.findIndex(s=>s.id===id);

if(index <= 0) return;

[sealList[index - 1],
sealList[index]] =

[sealList[index],
sealList[index - 1]];

for(let i=0;i<sealList.length;i++){

await updateDoc(
doc(db,"seals",sealList[i].id),
{
sortOrder:i + 1
}
);

}

await loadSeals();

}

async function moveDown(id){

const index =
sealList.findIndex(s=>s.id===id);

if(index >= sealList.length - 1)
return;

[sealList[index],
sealList[index + 1]] =

[sealList[index + 1],
sealList[index]];

for(let i=0;i<sealList.length;i++){

await updateDoc(
doc(db,"seals",sealList[i].id),
{
sortOrder:i + 1
}
);

}

await loadSeals();

}

async function addSeal(){

const name =
document.getElementById("newSeal")
.value.trim();

const order =
parseInt(
document.getElementById("newOrder").value
);

if(!name || isNaN(order)){

alert("請完整填寫");
return;

}

await addDoc(collection(db,"seals"),{

name:name,
sortOrder:order

});

document.getElementById("newSeal").value = "";
document.getElementById("newOrder").value = "";

alert("新增成功");

await loadSeals();

}

async function deleteSeal(id){

await deleteDoc(doc(db,"seals",id));

await loadSeals();

}

/* 借用 */

async function borrowSeal(){

const borrower =
document.getElementById("borrower")
.value.trim();

const department =
document.getElementById("department")
.value;

const seal =
document.getElementById("seal")
.value;

const purpose =
document.getElementById("purpose")
.value.trim();

const projectNo =
document.getElementById("projectNo")
.value.trim();

const formNo =
document.getElementById("formNo")
.value.trim();

if(!borrower || !department || !seal || !projectNo || !formNo || !purpose){

alert("請填寫必要欄位");
return;

}

/* 防止重複借用 */

const exists =
records.find(r=>

r.seal === seal &&
!r.returnTime

);

if(exists){

alert(`印鑑 ${seal} 目前借出中，無法重複借用`);

return;

}

/* 新增借用 */

await addDoc(collection(db,"sealRecords"),{

seal,

borrower:
document.getElementById("borrower").value
|| currentUser,

department,

projectNo,
formNo,

purpose,
borrowTime:new Date(),
returnTime:null

});

alert("借用成功");

loadRecords();

}

async function returnSeal(id){

await updateDoc(
doc(db,"sealRecords",id),
{
returnTime:new Date()
}
);

alert("已歸還");

loadRecords();

}

async function loadRecords(){

const querySnapshot =
await getDocs(collection(db,"sealRecords"));

records = [];

querySnapshot.forEach((docSnap)=>{

records.push({

id:docSnap.id,
...docSnap.data()

});

});

renderTable();
renderReturnTable();
renderStatus();
renderSealAlert();

}



function renderSealAlert(){

const alertBox =
document.getElementById("sealAlert");

if(!alertBox) return;

const total =
sealList.length;

const borrowed =
records.filter(r=>!r.returnTime).length;

const available =
total - borrowed;

let text = "";
let bg = "";
let color = "";

if(available <= 0){

text = "❌ 目前所有印鑑皆已借出";
bg = "#fee2e2";
color = "#991b1b";

}else if(available === 1){

text = "🔴 注意：目前僅剩最後 1 套印鑑";
bg = "#fecaca";
color = "#7f1d1d";

}else if(available === 2){

text = "⚠ 目前僅剩 2 套印鑑可借用";
bg = "#fef9c3";
color = "#854d0e";

}else{

text = `🟢 目前尚有 ${available} 套印鑑可借用`;
bg = "#dcfce7";
color = "#166534";

}

alertBox.innerHTML = text;

alertBox.style.background = bg;
alertBox.style.color = color;

}



function getBorrowDuration(borrowTime){
if(!borrowTime) return "-";
const start = borrowTime.seconds ? borrowTime.seconds*1000 : new Date(borrowTime).getTime();
const diff = Date.now() - start;
const days = Math.floor(diff/86400000);
const hours = Math.floor((diff%86400000)/3600000);
const mins = Math.floor((diff%3600000)/60000);
return `${days}天${hours}小時${mins}分`;
}

function renderTable(){

const keyword =
document.getElementById("searchInput")
.value.toLowerCase();

const sealFilter =
document.getElementById("sealFilter")
.value;

const projectFilter =
(document.getElementById("projectFilter")?.value || "").toLowerCase();

const formFilter =
(document.getElementById("formFilter")?.value || "").toLowerCase();

const borrowDate =
document.getElementById("borrowDate")
.value;

const returnDate =
document.getElementById("returnDate")
.value;

const table =
document.getElementById("recordTable");

table.innerHTML = "";

const filteredRecords = records
.filter(r=>{

const keywordMatch =

r.borrower.toLowerCase().includes(keyword) ||

r.department.toLowerCase().includes(keyword) ||

r.purpose.toLowerCase().includes(keyword);

const sealMatch =

!sealFilter ||

r.seal === sealFilter;

const projectMatch =
!projectFilter ||
((r.projectNo || "").toLowerCase().includes(projectFilter));

const formMatch =
!formFilter ||
((r.formNo || "").toLowerCase().includes(formFilter));

const borrowMatch =

!borrowDate ||

sameDate(r.borrowTime,borrowDate);

const returnMatch =

!returnDate ||

sameDate(r.returnTime,returnDate);

return (

keywordMatch &&
sealMatch &&
projectMatch &&
formMatch &&
borrowMatch &&
returnMatch

);

})
.sort((a,b)=>{

const t1 =
a.borrowTime?.seconds
? a.borrowTime.seconds
: 0;

const t2 =
b.borrowTime?.seconds
? b.borrowTime.seconds
: 0;

return t2 - t1;

});

const totalPages =
Math.ceil(filteredRecords.length / pageSize);

if(currentPage > totalPages){
currentPage = 1;
}

const start =
(currentPage - 1) * pageSize;

const end =
start + pageSize;

const pageRecords =
filteredRecords.slice(start,end);

pageRecords.forEach(r=>{

const tr =
document.createElement("tr");

tr.innerHTML = `

<td>${r.seal}</td>

<td>${r.borrower}</td>

<td>${r.department}</td>

<td>${formatDate(r.borrowTime)}</td>

<td>${formatDate(r.returnTime)}</td>

<td>${r.projectNo || ""}</td>

<td>${r.formNo || ""}</td>

<td>${r.purpose}</td>

<td>

${r.returnTime

? '<span class="badge badge-green">已歸還</span>'

: '<span class="badge badge-red">借出中</span>'

}

</td>

<td>
${r.returnTime
? '<span style="color:#64748b;">🔒 已封存</span>'
: `<button class="btn btn-gray" onclick="editRecord('${r.id}')">✏編輯</button>
<button class="btn btn-red" onclick="deleteRecord('${r.id}')">🗑刪除</button>`
}
</td>

`;

table.appendChild(tr);

});

renderPagination(totalPages);

}


function renderPagination(totalPages){

const area =
document.getElementById("paginationArea");

area.innerHTML = "";

if(totalPages <= 1) return;

for(let i=1;i<=totalPages;i++){

const btn =
document.createElement("button");

btn.className = "btn";

btn.innerText = i;

btn.style.background =
i === currentPage
? "#2563eb"
: "#e2e8f0";

btn.style.color =
i === currentPage
? "white"
: "black";

btn.onclick = ()=>{

currentPage = i;
renderTable();

};

area.appendChild(btn);

}

}

function changePageSize(){

pageSize = parseInt(
document.getElementById("pageSizeSelect").value
);

currentPage = 1;

renderTable();

}




function closeEditModal(){
document.getElementById('editOverlay').style.display='none';

async function editRecord(id){
const r = records.find(x=>x.id===id);
if(!r || r.returnTime){ alert('已歸還資料不可編輯'); return; }

document.getElementById('editId').value=id;
document.getElementById('editBorrower').value=r.borrower||'';
document.getElementById('editDepartment').value=r.department||'';
document.getElementById('editProjectNo').value=r.projectNo||'';
document.getElementById('editFormNo').value=r.formNo||'';
document.getElementById('editPurpose').value=r.purpose||'';

document.getElementById('editOverlay').style.display='flex';
}

async function saveEditRecord(){
const id=document.getElementById('editId').value;

await updateDoc(doc(db,"sealRecords",id),{
borrower:document.getElementById('editBorrower').value,
department:document.getElementById('editDepartment').value,
projectNo:document.getElementById('editProjectNo').value,
formNo:document.getElementById('editFormNo').value,
purpose:document.getElementById('editPurpose').value
});

closeEditModal();
alert('修改成功');
loadRecords();
}

async function deleteRecord(id){

const r = records.find(x=>x.id===id);

if(r && r.returnTime){
alert("已歸還資料不可刪除");
return;
}

if(!confirm("確定刪除此借用紀錄？")) return;

await deleteDoc(doc(db,"sealRecords",id));

alert("刪除成功");
loadRecords();
}


function exportExcel(){

const data =
records.map(r=>({

印鑑:r.seal,
借用人:r.borrower,
部門:r.department,
計畫編號:r.projectNo || "",
表單編號:r.formNo || "",
借用時間:formatDate(r.borrowTime),
歸還時間:formatDate(r.returnTime),
用途:r.purpose,
狀態:r.returnTime ? "已歸還" : "借出中"

}));

const ws =
XLSX.utils.json_to_sheet(data);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"印鑑借用紀錄"
);

XLSX.writeFile(
wb,
"印鑑借用紀錄.xlsx"
);

}
