<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>印鑑借用管理系統｜Firebase 雲端版</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans TC',sans-serif;
}

body{
    background:#f1f5f9;
    padding:20px;
    color:#1e293b;
}

.header{
    background:linear-gradient(135deg,#1d4ed8,#2563eb);
    color:white;
    padding:25px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.header h1{
    font-size:32px;
}

.layout{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:20px;
}

.panel{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.06);
    margin-bottom:20px;
}

.panel h2{
    color:#1d4ed8;
    margin-bottom:18px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #dbe4f0;
    background:#f8fafc;
    font-size:15px;
}

textarea{
    resize:vertical;
}

.btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.btn-green{
    background:#16a34a;
    color:white;
}

.btn-green:hover{
    background:#15803d;
}

.btn-red{
    background:#dc2626;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.status-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.card{
    border-radius:16px;
    padding:18px;
    color:white;
}

.available{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.borrowed{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.card h3{
    font-size:26px;
    margin-bottom:10px;
}

.card p{
    font-size:18px;
    font-weight:bold;
}

.alert-box{
    background:#fef2f2;
    border:1px solid #fecaca;
    color:#991b1b;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
}

.filter-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

.filter-bar input{
    padding:10px;
    border-radius:10px;
    border:1px solid #cbd5e1;
}

.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e3a8a;
    color:white;
    padding:14px;
    font-size:14px;
}

td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:center;
    font-size:14px;
}

tr:hover{
    background:#f8fafc;
}

.badge{
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.badge-red{
    background:#fee2e2;
    color:#991b1b;
}

.badge-green{
    background:#dcfce7;
    color:#166534;
}

.return-btn{
    border:none;
    background:#16a34a;
    color:white;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}

.pagination{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.page-btn{
    border:none;
    background:#2563eb;
    color:white;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}

.maintenance-list{
    margin-top:15px;
}

.maintenance-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #e2e8f0;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#64748b;
}

@media(max-width:1000px){

    .layout{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="header">
    <h1>🏢 印鑑借用管理系統</h1>
</div>

<div class="layout">

    <!-- 左側 -->
    <div>

        <!-- 借用 -->
        <div class="panel">

            <h2>✍️ 借用登記</h2>

            <div class="form-group">
                <label>借用人</label>
                <input type="text" id="borrower">
            </div>

            <div class="form-group">
                <label>部門</label>
                <input type="text" id="department">
            </div>

            <div class="form-group">
                <label>印鑑編號</label>

                <select id="seal"></select>

            </div>

            <div class="form-group">
                <label>用途</label>
                <textarea id="purpose" rows="4"></textarea>
            </div>

            <button class="btn btn-primary" onclick="borrowSeal()">
                📌 確認借用
            </button>

        </div>

        <!-- 尚未歸還 -->
        <div class="panel">

            <h2>⚠ 尚未歸還專區</h2>

            <div id="unreturnedArea"></div>

        </div>

        <!-- 印鑑維護 -->
        <div class="panel">

            <h2>🛠 印鑑維護</h2>

            <div class="form-group">
                <label>新增印鑑編號</label>
                <input type="text" id="newSeal">
            </div>

            <button class="btn btn-green" onclick="addSeal()">
                ➕ 新增印鑑
            </button>

            <div class="maintenance-list" id="sealListArea"></div>

        </div>

    </div>

    <!-- 右側 -->
    <div>

        <!-- 狀態 -->
        <div class="panel">

            <h2>📦 即時狀態</h2>

            <div class="status-grid" id="statusGrid"></div>

        </div>

        <!-- 借用紀錄 -->
        <div class="panel">

            <h2>📋 借用紀錄</h2>

            <div class="filter-bar">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="搜尋借用人 / 部門 / 用途"
                >

                <input type="date" id="startDate">

                <input type="date" id="endDate">

                <button class="btn-green" onclick="exportExcel()">
                    📊 匯出 Excel
                </button>

            </div>

            <div class="table-wrap">

                <table>

                    <thead>

                        <tr>
                            <th>印鑑</th>
                            <th>借用人</th>
                            <th>部門</th>
                            <th>借用時間</th>
                            <th>歸還時間</th>
                            <th>用途</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>

                    </thead>

                    <tbody id="recordTable"></tbody>

                </table>

            </div>

            <div class="pagination">

                <button class="page-btn" id="prevBtn">
                    上一頁
                </button>

                <span id="pageInfo"></span>

                <button class="page-btn" id="nextBtn">
                    下一頁
                </button>

            </div>

        </div>

    </div>

</div>

<div class="footer">
    Firebase 雲端版｜印鑑借用管理系統
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    deleteDoc,
    doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyCzvPwTbxc_Lg7peKRgP0zUrlmI6kkE0b4",
    authDomain: "seal-management-68465.firebaseapp.com",
    projectId: "seal-management-68465",
    storageBucket: "seal-management-68465.firebasestorage.app",
    messagingSenderId: "933578260928",
    appId: "1:933578260928:web:4c5f41252fd786e1bf0825",
    measurementId: "G-7RKPNF7BK9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let records = [];
let sealList = [];

const rowsPerPage = 10;
let currentPage = 1;

function formatDate(date){

    if(!date) return "-";

    if(date.seconds){

        return new Date(date.seconds * 1000)
            .toLocaleString("zh-TW");

    }

    return new Date(date).toLocaleString("zh-TW");

}

async function loadSeals(){

    const querySnapshot =
        await getDocs(collection(db,"seals"));

    sealList = [];

    querySnapshot.forEach((docSnap)=>{

        sealList.push({

            id:docSnap.id,
            ...docSnap.data()

        });

    });

    renderSealDropdown();
    renderSealMaintenance();
    renderStatus();

}

function renderSealDropdown(){

    const select =
        document.getElementById("seal");

    select.innerHTML =
        `<option value="">請選擇</option>`;

    sealList.forEach(seal=>{

        select.innerHTML += `
            <option value="${seal.name}">
                ${seal.name}
            </option>
        `;

    });

}

function renderSealMaintenance(){

    const area =
        document.getElementById("sealListArea");

    area.innerHTML = "";

    sealList.forEach(seal=>{

        const div =
            document.createElement("div");

        div.className =
            "maintenance-item";

        div.innerHTML = `

            <span>${seal.name}</span>

            <button
                class="btn-red"
                onclick="deleteSeal('${seal.id}')"
            >
                刪除
            </button>

        `;

        area.appendChild(div);

    });

}

async function addSeal(){

    const name =
        document.getElementById("newSeal")
        .value
        .trim();

    if(!name){

        alert("請輸入印鑑編號");
        return;
    }

    const exists =
        sealList.find(s=>s.name===name);

    if(exists){

        alert("此印鑑已存在");
        return;
    }

    await addDoc(collection(db,"seals"),{

        name:name

    });

    document.getElementById("newSeal").value = "";

    alert("新增成功");

    loadSeals();

}

async function deleteSeal(id){

    const target =
        sealList.find(s=>s.id===id);

    const borrowed =
        records.find(r=>
            r.seal===target.name &&
            !r.returnTime
        );

    if(borrowed){

        alert("此印鑑目前借出中，無法刪除");
        return;
    }

    await deleteDoc(doc(db,"seals",id));

    alert("已刪除");

    loadSeals();

}

async function borrowSeal(){

    const borrower =
        document.getElementById("borrower").value.trim();

    const department =
        document.getElementById("department").value.trim();

    const seal =
        document.getElementById("seal").value;

    const purpose =
        document.getElementById("purpose").value.trim();

    if(!borrower || !seal || !purpose){

        alert("請填寫必要欄位");
        return;
    }

    const alreadyBorrowed =
        records.find(r=>r.seal===seal && !r.returnTime);

    if(alreadyBorrowed){

        alert(`印鑑 ${seal} 目前借出中`);
        return;
    }

    await addDoc(collection(db,"sealRecords"),{

        seal,
        borrower,
        department,
        purpose,
        borrowTime:new Date(),
        returnTime:null

    });

    alert("借用成功");

    loadRecords();

}

async function returnSeal(id){

    await updateDoc(doc(db,"sealRecords",id),{

        returnTime:new Date()

    });

    alert("已完成歸還");

    loadRecords();

}

async function loadRecords(){

    const querySnapshot =
        await getDocs(collection(db,"sealRecords"));

    records = [];

    querySnapshot.forEach((docSnap)=>{

        records.push({

            id:docSnap.id,
            ...docSnap.data()

        });

    });

    renderStatus();
    renderTable();
    renderUnreturned();

}

function renderStatus(){

    const grid =
        document.getElementById("statusGrid");

    grid.innerHTML = "";

    sealList.forEach(seal=>{

        const active =
            records.find(r=>
                r.seal===seal.name &&
                !r.returnTime
            );

        const card =
            document.createElement("div");

        card.className =
            active ? "card borrowed" : "card available";

        card.innerHTML = `

            <h3>${seal.name}</h3>

            <p>
                ${active ? "🔴 借出中" : "🟢 可借用"}
            </p>

            <small>
                ${
                    active
                    ? `借用人：${active.borrower}`
                    : "目前可使用"
                }
            </small>

        `;

        grid.appendChild(card);

    });

}

function renderUnreturned(){

    const area =
        document.getElementById("unreturnedArea");

    area.innerHTML = "";

    const activeList =
        records.filter(r=>!r.returnTime);

    if(activeList.length===0){

        area.innerHTML = "目前無未歸還紀錄";
        return;
    }

    activeList.forEach(r=>{

        const div =
            document.createElement("div");

        div.className =
            "alert-box";

        div.innerHTML = `

            ⚠ 印鑑 ${r.seal} 尚未歸還<br>

            借用人：${r.borrower}

        `;

        area.appendChild(div);

    });

}

function getFilteredRecords(){

    const keyword =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    const startDate =
        document.getElementById("startDate").value;

    const endDate =
        document.getElementById("endDate").value;

    return records.filter(r=>{

        const matchKeyword =

            r.borrower.toLowerCase().includes(keyword) ||

            r.department.toLowerCase().includes(keyword) ||

            r.purpose.toLowerCase().includes(keyword);

        const borrowDate =
            new Date(r.borrowTime.seconds * 1000);

        let matchDate = true;

        if(startDate){

            matchDate =
                borrowDate >= new Date(startDate);

        }

        if(endDate){

            const end = new Date(endDate);

            end.setHours(23,59,59);

            matchDate =
                matchDate && borrowDate <= end;

        }

        return matchKeyword && matchDate;

    });

}

function renderTable(){

    const table =
        document.getElementById("recordTable");

    table.innerHTML = "";

    const filtered =
        getFilteredRecords().reverse();

    const totalPages =
        Math.ceil(filtered.length / rowsPerPage);

    const start =
        (currentPage - 1) * rowsPerPage;

    const pageData =
        filtered.slice(start, start + rowsPerPage);

    pageData.forEach(r=>{

        const tr =
            document.createElement("tr");

        tr.innerHTML = `

            <td>${r.seal}</td>

            <td>${r.borrower}</td>

            <td>${r.department}</td>

            <td>${formatDate(r.borrowTime)}</td>

            <td>${formatDate(r.returnTime)}</td>

            <td>${r.purpose}</td>

            <td>

                ${
                    r.returnTime
                    ? '<span class="badge badge-green">已歸還</span>'
                    : '<span class="badge badge-red">借出中</span>'
                }

            </td>

            <td>

                ${
                    !r.returnTime

                    ? `
                        <button
                            class="return-btn"
                            onclick="returnSeal('${r.id}')"
                        >
                            歸還
                        </button>
                    `

                    : '-'
                }

            </td>

        `;

        table.appendChild(tr);

    });

    document.getElementById("pageInfo").innerText =
        `第 ${currentPage} / ${totalPages || 1} 頁`;

}

function exportExcel(){

    const data =
        getFilteredRecords().map(r=>({

            印鑑:r.seal,
            借用人:r.borrower,
            部門:r.department,
            借用時間:formatDate(r.borrowTime),
            歸還時間:formatDate(r.returnTime),
            用途:r.purpose,
            狀態:r.returnTime ? "已歸還" : "借出中"

        }));

    const ws =
        XLSX.utils.json_to_sheet(data);

    const wb =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "印鑑借用紀錄"
    );

    XLSX.writeFile(
        wb,
        "印鑑借用紀錄.xlsx"
    );

}

window.borrowSeal = borrowSeal;
window.returnSeal = returnSeal;
window.exportExcel = exportExcel;
window.addSeal = addSeal;
window.deleteSeal = deleteSeal;

document.getElementById("searchInput")
.addEventListener("input",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("startDate")
.addEventListener("change",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("endDate")
.addEventListener("change",()=>{

    currentPage = 1;

    renderTable();

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

    if(currentPage>1){

        currentPage--;

        renderTable();

    }

});

document.getElementById("nextBtn")
.addEventListener("click",()=>{

    const totalPages =
        Math.ceil(getFilteredRecords().length / rowsPerPage);

    if(currentPage < totalPages){

        currentPage++;

        renderTable();

    }

});

loadSeals();
loadRecords();

</script>

</body>
</html>
