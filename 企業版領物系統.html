<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業版領物系統</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    display:flex;
    background:#eef2f7;
    color:#1e293b;
}

/* Sidebar */

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#ffffff;
    border-right:1px solid #dbe2ea;
    padding:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:24px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:35px;
}

.menu{
    list-style:none;
}

.menu li{
    padding:14px 16px;
    margin-bottom:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.menu li:hover,
.menu .active{
    background:#2563eb;
    color:white;
}

/* Main */

.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:25px;
}

/* Topbar */

.topbar{
    background:white;
    padding:20px 25px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.topbar h1{
    font-size:30px;
}

.user{
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border-radius:999px;
}

/* Dashboard */

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h3{
    color:#64748b;
    margin-bottom:10px;
}

.card p{
    font-size:42px;
    font-weight:bold;
    color:#2563eb;
}

/* Section */

.section{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.section-header h2{
    font-size:24px;
}

/* Product Grid */

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.product-card{
    border:1px solid #e2e8f0;
    border-radius:18px;
    padding:18px;
    background:#fff;
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-3px);
}

.product-img{
    height:120px;
    border-radius:14px;
    background:linear-gradient(135deg,#dbeafe,#bfdbfe);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    margin-bottom:15px;
}

.product-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.stock{
    color:#64748b;
    margin-bottom:12px;
}

.qty-box{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.qty-box input{
    flex:1;
}

button{
    border:none;
    cursor:pointer;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
}

.add-btn{
    width:100%;
    background:#2563eb;
    color:white;
}

/* Cart */

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:14px;
    border-bottom:1px solid #e2e8f0;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

/* Form */

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

input,
select{
    padding:12px;
    border-radius:12px;
    border:1px solid #d1d5db;
}

/* Table */

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:14px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
}

th{
    background:#f8fafc;
    color:#64748b;
}

.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.pending{
    background:#fef3c7;
    color:#92400e;
}

.approved{
    background:#dcfce7;
    color:#166534;
}

.rejected{
    background:#fee2e2;
    color:#991b1b;
}

.approve-btn{
    background:#10b981;
    color:white;
    margin-right:5px;
}

.reject-btn{
    background:#ef4444;
    color:white;
}

/* Signature */

.signature{
    border:2px dashed #94a3b8;
    border-radius:18px;
    padding:25px;
    margin-top:20px;
}

.signature-title{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
    font-weight:bold;
}

.sign-row{
    display:flex;
    justify-content:space-between;
    margin-top:60px;
}

.sign-box{
    width:30%;
    border-top:2px solid #334155;
    text-align:center;
    padding-top:10px;
}

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        width:100%;
    }

}

</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">
        📦 領物系統
    </div>

    <ul class="menu">
        <li class="active">首頁</li>
        <li>領物管理</li>
        <li>購物車</li>
        <li>訂單管理</li>
        <li>庫存管理</li>
        <li>報表下載</li>
    </ul>

</div>

<div class="main">

    <div class="topbar">

        <h1>辦公室用品領物系統</h1>

        <div class="user">
            行政部管理員
        </div>

    </div>

    <div class="dashboard">

        <div class="card">
            <h3>待審核訂單</h3>
            <p id="pendingCount">0</p>
        </div>

        <div class="card">
            <h3>已核准</h3>
            <p id="approvedCount">0</p>
        </div>

        <div class="card">
            <h3>購物車品項</h3>
            <p id="cartCount">0</p>
        </div>

        <div class="card">
            <h3>文具品項</h3>
            <p id="itemCount">0</p>
        </div>

    </div>

    <!-- 商品 -->

    <div class="section">

        <div class="section-header">
            <h2>🛒 文具選購</h2>
        </div>

        <div class="product-grid" id="productGrid"></div>

    </div>

    <!-- 購物車 -->

    <div class="section">

        <div class="section-header">
            <h2>🧾 購物車</h2>
        </div>

        <div id="cartArea"></div>

        <div class="total">
            總品項：<span id="totalItems">0</span>
        </div>

        <div class="form-grid">

            <input type="text" id="user" placeholder="申請人">

            <input type="text" id="department" placeholder="部門">

            <select id="type">
                <option>辦公用品</option>
                <option>贈送紀念品</option>
            </select>

            <input type="text" id="purpose" placeholder="用途 / 備註">

        </div>

        <br>

        <button class="add-btn" onclick="submitOrder()">
            🚀 送出（線上簽核）
        </button>

    </div>

    <!-- 訂單管理 -->

    <div class="section">

        <div class="section-header">
            <h2>📋 訂單管理（主管端）</h2>

            <button onclick="exportExcel()">
                匯出 Excel
            </button>

        </div>

        <table>

            <thead>
                <tr>
                    <th>日期</th>
                    <th>申請人</th>
                    <th>部門</th>
                    <th>品項</th>
                    <th>用途</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>

            <tbody id="orderTable"></tbody>

        </table>

    </div>

    <!-- 簽領單 -->

    <div class="section">

        <div class="section-header">
            <h2>🖊️ 文具簽領單</h2>
        </div>

        <select id="signatureSelect" onchange="generateSignature()">
            <option value="">請選擇已核准訂單</option>
        </select>

        <div id="signatureArea"></div>

    </div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [

    {id:1,name:"原子筆",stock:50,icon:"🖊️"},
    {id:2,name:"便利貼",stock:30,icon:"🟨"},
    {id:3,name:"A4影印紙",stock:20,icon:"📄"},
    {id:4,name:"資料夾",stock:15,icon:"📁"}

];

let cart = [];

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function saveData(){

    localStorage.setItem("orders",JSON.stringify(orders));
    localStorage.setItem("products",JSON.stringify(products));

}

function renderProducts(){

    const grid = document.getElementById("productGrid");

    grid.innerHTML = "";

    products.forEach(product=>{

        grid.innerHTML += `

            <div class="product-card">

                <div class="product-img">
                    ${product.icon}
                </div>

                <div class="product-name">
                    ${product.name}
                </div>

                <div class="stock">
                    庫存：${product.stock}
                </div>

                <div class="qty-box">

                    <input type="number" id="qty-${product.id}" min="1" value="1">

                </div>

                <button class="add-btn" onclick="addToCart(${product.id})">
                    加入購物車
                </button>

            </div>

        `;

    });

    document.getElementById("itemCount").innerText = products.length;

}

function addToCart(id){

    const product = products.find(p=>p.id===id);

    const qty = parseInt(document.getElementById(`qty-${id}`).value);

    if(qty > product.stock){

        alert("庫存不足");
        return;

    }

    cart.push({

        name:product.name,
        quantity:qty

    });

    renderCart();

}

function renderCart(){

    const area = document.getElementById("cartArea");

    area.innerHTML = "";

    cart.forEach(item=>{

        area.innerHTML += `

            <div class="cart-item">

                <div>
                    ${item.name}
                </div>

                <div>
                    x ${item.quantity}
                </div>

            </div>

        `;

    });

    document.getElementById("cartCount").innerText = cart.length;
    document.getElementById("totalItems").innerText = cart.length;

}

function submitOrder(){

    const user = document.getElementById("user").value;
    const department = document.getElementById("department").value;
    const type = document.getElementById("type").value;
    const purpose = document.getElementById("purpose").value;

    if(cart.length===0){

        alert("請先加入商品");
        return;

    }

    orders.push({

        id:Date.now(),
        date:new Date().toLocaleDateString(),
        user,
        department,
        type,
        purpose,
        items:[...cart],
        status:"待審核"

    });

    cart = [];

    saveData();

    renderCart();
    renderOrders();

    alert("✅ 已送出線上簽核");

}

function renderOrders(){

    const table = document.getElementById("orderTable");

    table.innerHTML = "";

    orders.slice().reverse().forEach(order=>{

        table.innerHTML += `

            <tr>

                <td>${order.date}</td>

                <td>${order.user}</td>

                <td>${order.department}</td>

                <td>
                    ${order.items.map(i=>i.name+" x"+i.quantity).join("<br>")}
                </td>

                <td>${order.purpose}</td>

                <td>

                    ${
                        order.status==="待審核"
                        ? '<span class="status pending">待審核</span>'
                        : order.status==="已核准"
                        ? '<span class="status approved">已核准</span>'
                        : '<span class="status rejected">已退件</span>'
                    }

                </td>

                <td>

                    ${
                        order.status==="待審核"
                        ?

                        `
                        <button class="approve-btn" onclick="approveOrder(${order.id})">
                            核准
                        </button>

                        <button class="reject-btn" onclick="rejectOrder(${order.id})">
                            退件
                        </button>
                        `

                        :

                        "-"
                    }

                </td>

            </tr>

        `;

    });

    document.getElementById("pendingCount").innerText =
        orders.filter(o=>o.status==="待審核").length;

    document.getElementById("approvedCount").innerText =
        orders.filter(o=>o.status==="已核准").length;

    renderSignatureSelect();

}

function approveOrder(id){

    const order = orders.find(o=>o.id===id);

    order.status = "已核准";

    order.items.forEach(item=>{

        const product = products.find(p=>p.name===item.name);

        product.stock -= item.quantity;

    });

    saveData();

    renderProducts();
    renderOrders();

}

function rejectOrder(id){

    const order = orders.find(o=>o.id===id);

    order.status = "已退件";

    saveData();

    renderOrders();

}

function renderSignatureSelect(){

    const select = document.getElementById("signatureSelect");

    select.innerHTML = `
        <option value="">
            請選擇已核准訂單
        </option>
    `;

    orders
    .filter(o=>o.status==="已核准")
    .forEach(order=>{

        select.innerHTML += `
            <option value="${order.id}">
                ${order.date}｜${order.user}
            </option>
        `;

    });

}

function generateSignature(){

    const id = document.getElementById("signatureSelect").value;

    const area = document.getElementById("signatureArea");

    if(!id){

        area.innerHTML = "";
        return;

    }

    const order = orders.find(o=>o.id==id);

    area.innerHTML = `

        <div class="signature">

            <div class="signature-title">
                文具領物簽收單
            </div>

            <p><strong>日期：</strong>${order.date}</p>
            <p><strong>申請人：</strong>${order.user}</p>
            <p><strong>部門：</strong>${order.department}</p>
            <p><strong>領用類型：</strong>${order.type}</p>

            <br>

            <table>

                <thead>
                    <tr>
                        <th>品項</th>
                        <th>數量</th>
                    </tr>
                </thead>

                <tbody>

                    ${order.items.map(item=>`
                        <tr>
                            <td>${item.name}</td>
                            <td>${item.quantity}</td>
                        </tr>
                    `).join("")}

                </tbody>

            </table>

            <br>

            <p><strong>用途：</strong>${order.purpose}</p>

            <div class="sign-row">

                <div class="sign-box">
                    申請人簽收
                </div>

                <div class="sign-box">
                    發放人員
                </div>

                <div class="sign-box">
                    主管覆核
                </div>

            </div>

        </div>

    `;

}

function exportExcel(){

    const worksheet = XLSX.utils.json_to_sheet(

        orders.map(order=>({

            日期:order.date,
            申請人:order.user,
            部門:order.department,
            品項:order.items.map(i=>i.name+" x"+i.quantity).join(", "),
            狀態:order.status

        }))

    );

    const workbook = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(workbook,worksheet,"訂單管理");

    XLSX.writeFile(workbook,"領物系統報表.xlsx");

}

renderProducts();
renderCart();
renderOrders();

</script>

</body>
</html>
